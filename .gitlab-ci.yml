image: node:20

stages:
  - instalar
  - testar

instalar_dependencias:
  stage: instalar
  script:
    - npm install -g yarn
    - yarn
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

executar_testes:
  stage: testar
  script:
    - yarn test
  artifacts:
    paths:
      - mochawesome-report/
    expire_in: 7 days
    when: always